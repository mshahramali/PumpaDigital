<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="robots" content="noindex, nofollow">
<title>PUMPA CRM — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #25d366;
    --accent-glow: rgba(37,211,102,0.15);
    --text: #f0f0f8;
    --text2: #8888aa;
    --text3: #555570;
    --red: #ff4d6d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background-image: radial-gradient(ellipse at 20% 50%, rgba(37,211,102,0.08) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 20%, rgba(74,77,255,0.06) 0%, transparent 50%);
  }

  .box {
    width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px;
    position: relative;
    overflow: hidden;
  }

  .box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }
  .logo span { color: var(--accent); }

  .sub {
    color: var(--text2);
    font-size: 13px;
    margin-bottom: 28px;
  }

  .tabs {
    display: flex;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 28px;
  }
  .tab {
    flex: 1;
    text-align: center;
    padding: 9px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: var(--text2);
    transition: all 0.2s;
    user-select: none;
  }
  .tab.active { background: var(--accent); color: #000; }

  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus { border-color: var(--accent); }
  .field-hint { font-size: 11px; color: var(--text3); margin-top: 6px; }

  .btn {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 13px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .msg {
    display: none;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 13px;
    margin-bottom: 16px;
    line-height: 1.5;
  }
  .msg.error { background: rgba(255,77,109,0.1); border: 1px solid rgba(255,77,109,0.3); color: var(--red); }
  .msg.success { background: var(--accent-glow); border: 1px solid rgba(37,211,102,0.3); color: var(--accent); }

  .forgot {
    text-align: center;
    margin-top: 18px;
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
  }
  .forgot:hover { color: var(--accent); }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="box">
  <div class="logo">PUMPA <span>CRM</span></div>
  <div class="sub">WhatsApp Marketing Platform</div>

  <div class="tabs">
    <div class="tab active" id="tab-signin" onclick="switchTab('signin')">Sign In</div>
    <div class="tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</div>
  </div>

  <div class="msg" id="msg"></div>

  <!-- SIGN IN FORM -->
  <div id="form-signin">
    <div class="field">
      <label>Email</label>
      <input type="email" id="si-email" placeholder="you@business.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="si-password" placeholder="Enter password" autocomplete="current-password">
    </div>
    <button class="btn" id="btn-signin" onclick="handleSignIn()">Sign In →</button>
    <div class="forgot" onclick="switchTab('forgot')">Forgot password?</div>
  </div>

  <!-- SIGN UP FORM -->
  <div id="form-signup" class="hidden">
    <div class="field">
      <label>Full Name</label>
      <input type="text" id="su-name" placeholder="Your name" autocomplete="name">
    </div>
    <div class="field">
      <label>Business Name</label>
      <input type="text" id="su-business" placeholder="e.g. Kapacious" autocomplete="organization">
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="su-email" placeholder="you@business.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="su-password" placeholder="Create a password" autocomplete="new-password">
      <div class="field-hint">Min 8 characters, with uppercase, lowercase, a number and a symbol.</div>
    </div>
    <button class="btn" id="btn-signup" onclick="handleSignUp()">Create Account →</button>
  </div>

  <!-- FORGOT PASSWORD FORM -->
  <div id="form-forgot" class="hidden">
    <div class="field">
      <label>Email</label>
      <input type="email" id="fp-email" placeholder="you@business.com" autocomplete="email">
    </div>
    <button class="btn" id="btn-forgot" onclick="handleForgotPassword()">Send Reset Link →</button>
    <div class="forgot" onclick="switchTab('signin')">← Back to Sign In</div>
  </div>
</div>

<script>
// ===== SUPABASE INIT =====
const SUPABASE_URL = 'https://dpeszhbdgxevlkrfllrc.supabase.co';
const SUPABASE_KEY = 'sb_publishable_gZj05PTTPix9SEKEwBXo5Q_W8YGBky2';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ===== IF ALREADY LOGGED IN, SKIP STRAIGHT TO APP =====
(async () => {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    window.location.href = 'app.html';
  }
})();

// ===== TAB SWITCHING =====
function switchTab(tab) {
  document.getElementById('form-signin').classList.add('hidden');
  document.getElementById('form-signup').classList.add('hidden');
  document.getElementById('form-forgot').classList.add('hidden');
  document.getElementById('tab-signin').classList.remove('active');
  document.getElementById('tab-signup').classList.remove('active');
  hideMsg();

  if (tab === 'signin') {
    document.getElementById('form-signin').classList.remove('hidden');
    document.getElementById('tab-signin').classList.add('active');
  } else if (tab === 'signup') {
    document.getElementById('form-signup').classList.remove('hidden');
    document.getElementById('tab-signup').classList.add('active');
  } else if (tab === 'forgot') {
    document.getElementById('form-forgot').classList.remove('hidden');
  }
}

// ===== MESSAGE HELPERS =====
function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}
function hideMsg() {
  document.getElementById('msg').style.display = 'none';
}

// ===== SIGN IN =====
async function handleSignIn() {
  const email = document.getElementById('si-email').value.trim();
  const password = document.getElementById('si-password').value;
  const btn = document.getElementById('btn-signin');

  if (!email || !password) {
    showMsg('Please enter both email and password.', 'error');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Signing in...';
  hideMsg();

  const { data, error } = await supabase.auth.signInWithPassword({ email, password });

  btn.disabled = false;
  btn.textContent = 'Sign In →';

  if (error) {
    if (error.message.toLowerCase().includes('email not confirmed')) {
      showMsg('Please confirm your email before signing in. Check your inbox for the verification link.', 'error');
    } else {
      showMsg('Invalid email or password.', 'error');
    }
    return;
  }

  window.location.href = 'app.html';
}

// ===== SIGN UP =====
function isStrongPassword(pw) {
  return pw.length >= 8 &&
         /[a-z]/.test(pw) &&
         /[A-Z]/.test(pw) &&
         /[0-9]/.test(pw) &&
         /[^a-zA-Z0-9]/.test(pw);
}

async function handleSignUp() {
  const fullName = document.getElementById('su-name').value.trim();
  const businessName = document.getElementById('su-business').value.trim();
  const email = document.getElementById('su-email').value.trim();
  const password = document.getElementById('su-password').value;
  const btn = document.getElementById('btn-signup');

  if (!fullName || !businessName || !email || !password) {
    showMsg('Please fill in all fields.', 'error');
    return;
  }

  if (!isStrongPassword(password)) {
    showMsg('Password must be at least 8 characters and include uppercase, lowercase, a number, and a symbol.', 'error');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Creating account...';
  hideMsg();

  const { data, error } = await supabase.auth.signUp({
    email,
    password,
    options: {
      data: {
        full_name: fullName,
        business_name: businessName
      },
      emailRedirectTo: window.location.origin + '/login.html'
    }
  });

  btn.disabled = false;
  btn.textContent = 'Create Account →';

  if (error) {
    if (error.message.toLowerCase().includes('already registered') || error.message.toLowerCase().includes('already exists')) {
      showMsg('An account with this email already exists. Try signing in instead.', 'error');
    } else {
      showMsg(error.message, 'error');
    }
    return;
  }

  showMsg('Account created! Please check your email (' + email + ') and click the confirmation link before signing in.', 'success');
  document.getElementById('su-name').value = '';
  document.getElementById('su-business').value = '';
  document.getElementById('su-email').value = '';
  document.getElementById('su-password').value = '';
}

// ===== FORGOT PASSWORD =====
async function handleForgotPassword() {
  const email = document.getElementById('fp-email').value.trim();
  const btn = document.getElementById('btn-forgot');

  if (!email) {
    showMsg('Please enter your email.', 'error');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Sending...';
  hideMsg();

  const { error } = await supabase.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/login.html'
  });

  btn.disabled = false;
  btn.textContent = 'Send Reset Link →';

  if (error) {
    showMsg(error.message, 'error');
    return;
  }

  showMsg('If an account exists for ' + email + ', a password reset link has been sent.', 'success');
}

// Enter key support
document.addEventListener('keydown', (e) => {
  if (e.key !== 'Enter') return;
  if (!document.getElementById('form-signin').classList.contains('hidden')) handleSignIn();
  else if (!document.getElementById('form-signup').classList.contains('hidden')) handleSignUp();
  else if (!document.getElementById('form-forgot').classList.contains('hidden')) handleForgotPassword();
});
</script>
</body>
</html>
