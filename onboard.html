<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Connect WhatsApp — PUMPA CRM</title>
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0; min-height: 100dvh; display: grid; place-items: center;
    background: #0b0f0d; color: #e8f0ea;
    font: 16px/1.55 -apple-system, "Segoe UI", system-ui, sans-serif;
  }
  .card {
    width: min(440px, 92vw); padding: 40px 36px;
    background: #11170f; border: 1px solid #1f2a1e; border-radius: 14px;
  }
  h1 { margin: 0 0 6px; font-size: 22px; letter-spacing: -.01em; }
  p.sub { margin: 0 0 28px; color: #7f8f83; font-size: 14px; }
  label { display: block; font-size: 11px; letter-spacing: .08em;
          text-transform: uppercase; color: #7f8f83; margin: 18px 0 6px; }
  input {
    width: 100%; box-sizing: border-box; padding: 11px 13px;
    background: #0b0f0d; border: 1px solid #24301f; border-radius: 8px;
    color: #e8f0ea; font-size: 15px;
  }
  input:focus { outline: none; border-color: #2ecc71; }
  button {
    width: 100%; margin-top: 26px; padding: 13px;
    background: #21c45d; color: #041007; border: 0; border-radius: 8px;
    font-size: 15px; font-weight: 600; cursor: pointer;
  }
  button:disabled { opacity: .45; cursor: not-allowed; }
  #status { margin-top: 18px; font-size: 14px; min-height: 20px; }
  .ok  { color: #21c45d; }
  .err { color: #ff6b6b; }
</style>
</head>
<body>
<div class="card">
  <h1>Connect WhatsApp</h1>
  <p class="sub">Link your WhatsApp Business account to PUMPA CRM.</p>

  <label for="business_name">Business name</label>
  <input id="business_name" placeholder="Your business name" />

  <label for="email">Your email</label>
  <input id="email" type="email" placeholder="you@example.com" />

  <button id="connect" disabled>Connect WhatsApp</button>
  <div id="status"></div>
</div>

<script>
// ── CONFIG ───────────────────────────────────────────────────
// app_id from your dashboard URL. config_id from Embedded Signup Builder.
const APP_ID    = '2142544706526194';
const CONFIG_ID = '1694672291449164';   // from Embedded Signup Builder

// ⚠️ BEFORE THIS WORKS:
//    Facebook Login for Business → Settings, add zyvonai.com to BOTH:
//      • Allowed Domains for the JavaScript SDK
//      • Valid OAuth Redirect URIs
//    Meta's doc is explicit — without both, the callback never fires
//    and you will spend a day debugging code that is fine.
// ─────────────────────────────────────────────────────────────

const statusEl = document.getElementById('status');
const btn      = document.getElementById('connect');
const say = (msg, cls = '') => { statusEl.textContent = msg; statusEl.className = cls; };

// This is the piece you don't have today. The popup posts back here.
// The hosted business.facebook.com link has no parent window of yours,
// so nothing is ever posted, and PUMPA never learns anyone signed up.
let session = null;

window.addEventListener('message', (event) => {
  // Meta posts from facebook.com, www., web. (common in Pakistan), or business.
  if (!/^https:\/\/([a-z0-9-]+\.)?facebook\.com$/.test(event.origin)) return;
  let data;
  try { data = JSON.parse(event.data); } catch { return; }
  if (data.type !== 'WA_EMBEDDED_SIGNUP') return;

  if (String(data.event || '').startsWith('FINISH')) {
    // Coexistence flows may use FINISH_WHATSAPP_BUSINESS_APP_ONBOARDING
    session = data.data;                    // { waba_id, phone_number_id }
    // Hand the email to our server, keyed by waba_id, so the webhook
    // (which never receives the email from Meta) can create the login.
    storePendingSignup(session.waba_id);
  } else if (data.event === 'CANCEL') {
    say('Cancelled at: ' + (data.data?.current_step || 'start'), 'err');
  } else if (data.event === 'ERROR') {
    say(data.data?.error_message || 'Signup error', 'err');
  }
});

window.fbAsyncInit = function () {
  FB.init({ appId: APP_ID, autoLogAge: true, xfbml: false, version: 'v25.0' });
  btn.disabled = false;
};

btn.addEventListener('click', () => {
  const email         = document.getElementById('email').value.trim();
  const business_name = document.getElementById('business_name').value.trim();
  if (!email) return say('Email required', 'err');

  // Remember what the user typed; used by storePendingSignup once we have a waba_id.
  window._pumpaEmail = email;
  window._pumpaBusinessName = business_name;

  session = null;
  say('Opening WhatsApp signup…');

  FB.login(
    (response) => {
      // Coexistence returns a code too, but our onboarding runs off the
      // webhook, so we don't need it. Success = the popup gave us a session.
      if (!session) {
        return say('Signup was not completed. If you finished on WhatsApp, you\'ll still receive your login email shortly.', 'err');
      }
      say('✅ Connected! Setting up your account — check your email for a login link in a minute.', 'ok');
    },
    {
      config_id: CONFIG_ID,
      response_type: 'code',
      override_default_response_type: true,
      extras: {
        setup: {},
        featureType: 'whatsapp_business_app_onboarding',
        sessionInfoVersion: '3',
        version: 'v4',
      },
    }
  );
});

// Store {waba_id, email, business_name} so the webhook can create the login.
// Safe to call more than once; the endpoint upserts on waba_id.
async function storePendingSignup(wabaId) {
  if (!wabaId) return;
  try {
    await fetch('/api/pending-signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        waba_id: wabaId,
        email: window._pumpaEmail || '',
        business_name: window._pumpaBusinessName || '',
      }),
    });
  } catch (e) {
    // Non-fatal: the client still connected; login email just may be delayed.
    console.error('pending-signup store failed', e);
  }
}
</script>
<script async defer crossorigin="anonymous" src="https://connect.facebook.net/en_US/sdk.js"></script>
</body>
</html>
